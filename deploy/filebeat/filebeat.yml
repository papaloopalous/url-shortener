filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

processors:
  - decode_json_fields:
      fields: ["message"]
      target: ""
      overwrite_keys: true
      add_error_key: true

output.logstash:
  hosts: ["logstash:5044"]

http:
  enabled: true
  host:    "0.0.0.0"
  port:    5066

logging.level: warning