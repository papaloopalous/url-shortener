input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ /^\s*\{/ {

    json {
      source => "message"
      target => "parsed"
    }

    mutate {
      rename => {
        "[parsed][time]"             => "timestamp"
        "[parsed][level]"            => "level"
        "[parsed][msg]"              => "msg"
        "[parsed][source]"           => "source"
        "[parsed][trace_id]"         => "trace_id"
        "[parsed][span_id]"          => "span_id"
        "[parsed][trace_sampled]"    => "trace_sampled"
        "[parsed][method]"           => "http_method"
        "[parsed][path]"             => "http_path"
        "[parsed][status]"           => "http_status"
        "[parsed][duration_ms]"      => "duration_ms"
        "[parsed][request_id]"       => "request_id"
        "[parsed][user][id]"         => "user_id"
        "[parsed][session][id]"      => "session_id"
        "[parsed][jti]"              => "jti"
        "[parsed][err]"              => "error"
        "[parsed][panic]"            => "panic"
      }

      remove_field => ["message", "parsed"]
    }

    date {
      match        => ["timestamp", "ISO8601"]
      target       => "@timestamp"
      remove_field => ["timestamp"]
    }

  } else {
    mutate {
      add_tag => ["plaintext"]
    }
  }

  mutate {
    add_field => { "service" => "auth-service" }
  }
}

output {
  elasticsearch {
    hosts            => ["http://elasticsearch:9200"]
    index            => "auth-service-%{+YYYY.MM.dd}"
  }
}